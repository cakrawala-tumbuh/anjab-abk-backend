# Konfigurasi Alembic untuk migrasi schema PostgreSQL.
# URL koneksi TIDAK ditaruh di sini — diisi dari DatabaseSettings di migrations/env.py
# (12-factor: rahasia hanya via environment, bukan file yang ter-commit).
[alembic]
script_location = migrations
prepend_sys_path = src
path_separator = os

# Format nama file revisi: urut + slug agar mudah dibaca dalam review.
file_template = %%(year)d%%(month).2d%%(day).2d_%%(rev)s_%%(slug)s

[post_write_hooks]
# Rapikan migrasi hasil autogenerate dengan Ruff (selaras tooling backend-skill).
# Pakai `exec` (jalankan biner `ruff` di PATH), BUKAN `console_scripts`: distribusi
# ruff berupa biner mandiri & tidak mendaftarkan entry point `console_scripts`.
hooks = ruff_format ruff_fix
ruff_format.type = exec
ruff_format.executable = ruff
ruff_format.options = format REVISION_SCRIPT_FILENAME
ruff_fix.type = exec
ruff_fix.executable = ruff
ruff_fix.options = check --fix REVISION_SCRIPT_FILENAME

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
